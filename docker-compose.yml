version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: spellbook_db
    environment:
      POSTGRES_DB: spellbook
      POSTGRES_USER: spellbook
      POSTGRES_PASSWORD: spellbook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spellbook -d spellbook"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
